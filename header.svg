<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0905"/>
      <stop offset="45%" stop-color="#2a1208"/>
      <stop offset="100%" stop-color="#c8844a"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c8844a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8844a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="860" height="200" rx="0"/>
    </clipPath>
  </defs>
  <rect width="860" height="200" fill="url(#bg)"/>
  <rect width="860" height="200" fill="url(#glow)"/>
  <!-- Divisor vertical sutil -->
  <line x1="430" y1="72" x2="430" y2="128" stroke="#c8a882" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Nome: Ana (peso leve) -->
  <text x="318" y="115" font-family="Georgia, serif" font-size="52" font-weight="300" fill="#f5e6d3" text-anchor="end" letter-spacing="-1">Ana</text>
  <!-- Nome: Souza (peso bold) -->
  <text x="328" y="115" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#f5e6d3" text-anchor="start" letter-spacing="-1">Souza</text>
  <!-- Subtítulo direita -->
  <text x="444" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="300" fill="#c8a882" text-anchor="start" letter-spacing="0.5">Full Stack Developer</text>
  <text x="444" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#a07850" text-anchor="start" letter-spacing="0.3">Software Engineering · UX/UI</text>
  <!-- Faísca decorativa (canto inferior direito, igual à imagem) -->
  <g transform="translate(830, 178)" fill="#c8a882" opacity="0.7">
    <polygon points="0,-7 1.5,-1.5 7,0 1.5,1.5 0,7 -1.5,1.5 -7,0 -1.5,-1.5" />
  </g>
</svg>
