<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0905"/>
      <stop offset="40%" stop-color="#1e0e06"/>
      <stop offset="100%" stop-color="#c8844a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#c8844a" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#c8844a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="860" height="200" fill="url(#bg)"/>
  <rect width="860" height="200" fill="url(#glow)"/>

  <!-- linha vertical separadora, igual à imagem -->
  <line x1="450" y1="76" x2="450" y2="130" stroke="#c8a882" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- "Ana" leve + "Souza" bold — alinhados à direita do divisor -->
  <!-- text-anchor="end" em x=440 garante que o bloco encosta no divisor -->
  <text font-family="'Trebuchet MS', Arial, sans-serif" font-size="50" fill="#f5e6d3" text-anchor="end">
    <tspan x="440" y="114" font-weight="300" letter-spacing="-0.5">Ana </tspan><tspan font-weight="700" letter-spacing="-0.5">Souza</tspan>
  </text>

  <!-- subtítulos à direita do divisor -->
  <text x="462" y="100" font-family="'Trebuchet MS', Arial, sans-serif" font-size="13" font-weight="400" fill="#c8a882" letter-spacing="0.3">Full Stack Developer</text>
  <text x="462" y="120" font-family="'Trebuchet MS', Arial, sans-serif" font-size="12" font-weight="300" fill="#9a7050" letter-spacing="0.2">Software Engineering · UX/UI</text>


</svg>
